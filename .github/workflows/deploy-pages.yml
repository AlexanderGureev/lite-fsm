name: Deploy Docs and Playground to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "docs/**"
      - "playground/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
            playground/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install root dependencies
        run: npm ci

      - name: Build lite-fsm dist
        run: npm run build

      - name: Install docs dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build docs (Next.js static export)
        working-directory: ./docs
        run: npx next build

      - name: Generate Pagefind search index for docs
        working-directory: ./docs
        run: npx pagefind --site .next/server/app --output-path out/_pagefind

      - name: Create Pagefind config for docs
        working-directory: ./docs
        run: echo '{ "baseUrl": "/lite-fsm" }' > out/_pagefind-config.json

      - name: Create Pagefind entry for docs
        working-directory: ./docs
        run: |
          cat > out/_pagefind/pagefind-entry.js << 'EOL'
          window.PagefindConfig = {
            baseUrl: "/lite-fsm",
            bundlePath: "/lite-fsm/_pagefind/"
          };
          EOL

      - name: Install playground dependencies
        working-directory: ./playground
        run: npm ci

      - name: Build playground (Next.js static export)
        working-directory: ./playground
        env:
          NODE_ENV: production
        run: npx next build

      - name: Combine docs and playground into single artifact
        run: |
          rm -rf docs/out/playground
          mkdir -p docs/out/playground
          cp -R playground/out/. docs/out/playground/
          touch docs/out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
