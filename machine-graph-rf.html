<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>machine graph view (react-flow + elk) · lite-fsm prototype</title>
    <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.3.5/dist/style.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1116;
        --panel: #161922;
        --panel-soft: #1c2029;
        --line: #2c3140;
        --line-soft: rgba(255, 255, 255, 0.06);
        --ink: #e9ecf2;
        --muted: #9aa1b1;
        --quiet: #6b7385;
        --accent: #7dd3c2;
        --accent-soft: rgba(125, 211, 194, 0.14);
        --external: #e6a957;
        --self-emit: #82c79c;
        --from-other: #c79de0;
        --domain: #7eb6f0;
        --actor: #d6a06b;
        --mono: "JetBrains Mono", "IBM Plex Mono", "SF Mono", ui-monospace, Menlo, monospace;
        --sans: "Inter", "IBM Plex Sans", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }
      .topbar .mark {
        display: grid;
        place-items: center;
        width: 24px;
        height: 24px;
        border: 1px solid rgba(125, 211, 194, 0.4);
        border-radius: 6px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
      }
      .topbar b {
        color: var(--ink);
        font-weight: 600;
      }
      .topbar .stack {
        color: var(--quiet);
        margin-left: auto;
        font-size: 11px;
      }
      .topbar .stack b {
        color: var(--ink);
      }

      /* react-flow surface tweaks */
      .react-flow {
        background: var(--bg);
      }
      .react-flow__background {
        background-color: var(--bg);
      }
      .react-flow__attribution {
        display: none;
      }
      .react-flow__controls {
        background: var(--panel-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
      }
      .react-flow__controls-button {
        background: var(--panel-soft);
        border-bottom: 1px solid var(--line);
        color: var(--ink);
        fill: var(--ink);
      }
      .react-flow__controls-button:hover {
        background: var(--panel);
      }
      .react-flow__handle {
        opacity: 0;
        pointer-events: none;
      }

      /* state node — both width and height come from data props because
         they scale with content: width with label length so long state
         names don't overflow, height with side degree so ELK has vertical
         room for edge attachment points. */
      .state-node {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding: 8px 12px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: var(--mono);
        cursor: default;
        user-select: none;
        transition:
          border-color 0.15s,
          background 0.15s,
          box-shadow 0.15s;
      }
      .state-node:hover {
        border-color: var(--muted);
        background: var(--panel-soft);
      }
      .state-node.is-initial {
        border-color: rgba(125, 211, 194, 0.4);
      }
      .state-node.is-terminal {
        border-style: dashed;
        background: rgba(255, 255, 255, 0.02);
      }
      /* synthetic wildcard hub — visually distinct from real states:
         dashed quiet outline, larger glyph, "any state" subtitle */
      .state-node.is-wildcard {
        border-style: dashed;
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.025);
      }
      .state-node.is-wildcard .name {
        font-size: 22px;
        line-height: 1;
        color: var(--muted);
      }
      .state-node.is-wildcard .marker.any {
        color: var(--quiet);
        background: transparent;
        letter-spacing: 0.08em;
        padding: 1px 0;
      }
      .state-node.is-wildcard .stats { color: var(--quiet); }
      .state-node.is-current {
        border-color: var(--accent);
        background: rgba(125, 211, 194, 0.12);
        box-shadow: 0 0 0 1px rgba(125, 211, 194, 0.35);
      }
      .state-node .row1 {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .state-node .name {
        font-size: 12px;
        font-weight: 600;
        color: var(--ink);
        flex: 1;
        white-space: nowrap;
      }
      .state-node .marker {
        font-size: 9px;
        color: var(--quiet);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 1px 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.04);
      }
      .state-node .marker.initial {
        color: var(--accent);
        background: var(--accent-soft);
      }
      .state-node .marker.spawn {
        color: var(--actor);
        background: rgba(214, 160, 107, 0.12);
      }
      .state-node .stats {
        display: flex;
        gap: 6px;
        font-size: 9.5px;
        color: var(--quiet);
      }
      .state-node .stats .stat {
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }
      .state-node .stats .stat::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .state-node .stats .in::before {
        background: var(--external);
      }
      .state-node .stats .out::before {
        background: var(--from-other);
      }

      /* edge label */
      .edge-label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        max-width: 170px;
        background: var(--bg);
        border: 1px solid var(--line);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 10px;
        line-height: 1.2;
        color: var(--ink);
        cursor: default;
        user-select: none;
        white-space: nowrap;
        transition:
          border-color 0.1s,
          background 0.1s;
      }
      .edge-label .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .edge-label.cat-external {
        color: var(--external);
        border-color: rgba(230, 169, 87, 0.4);
      }
      .edge-label.cat-self {
        color: var(--self-emit);
        border-color: rgba(130, 199, 156, 0.4);
      }
      .edge-label.cat-other {
        color: var(--from-other);
        border-color: rgba(199, 157, 224, 0.4);
      }
      .edge-label:hover {
        background: var(--panel-strong, var(--panel-soft));
        border-color: currentColor;
      }
      .edge-label .count {
        margin-left: 4px;
        opacity: 0.7;
        font-size: 9px;
      }

      /* hover popover with full event list — floats above viewport in screen coords */
      .events-popover {
        position: fixed;
        z-index: 100;
        background: rgba(15, 17, 22, 0.97);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        min-width: 200px;
        max-width: min(360px, calc(100vw - 24px));
        box-sizing: border-box;
        overflow-wrap: anywhere;
        word-break: break-word;
        transition: opacity 0.08s;
      }
      .events-popover .head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--line-soft);
      }
      .events-popover .head b {
        overflow-wrap: anywhere;
        word-break: break-word;
        max-width: 100%;
      }
      .events-popover .cat {
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .events-popover .cat.cat-external {
        color: var(--external);
      }
      .events-popover .cat.cat-self {
        color: var(--self-emit);
      }
      .events-popover .cat.cat-other {
        color: var(--from-other);
      }
      .events-popover .arrow {
        color: var(--quiet);
        font-size: 10px;
      }
      .events-popover .target {
        color: var(--accent);
        overflow-wrap: anywhere;
        word-break: break-word;
        max-width: 100%;
      }
      .events-popover .ev {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 4px 6px;
        padding: 3px 0;
      }
      .events-popover .ev::before {
        content: "";
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        flex: 0 0 auto;
      }
      .events-popover .ev.cat-external {
        color: var(--external);
      }
      .events-popover .ev.cat-self {
        color: var(--self-emit);
      }
      .events-popover .ev.cat-other {
        color: var(--from-other);
      }
      /* Event name + producer path: long `machine.state` strings must wrap
         instead of spilling past max-width (flex items default to min-width:auto). */
      .events-popover .ev .ev-name {
        flex: 1 1 120px;
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .events-popover .ev .from {
        flex: 1 1 100%;
        margin-left: 0;
        padding-left: 11px;
        box-sizing: border-box;
        max-width: 100%;
        color: var(--quiet);
        font-size: 9.5px;
        font-style: italic;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "@xyflow/react": "https://esm.sh/@xyflow/react@12.3.5?deps=react@18.3.1,react-dom@18.3.1",
          "elkjs": "https://esm.sh/elkjs@0.9.3",
          "htm": "https://esm.sh/htm@3.1.1"
        }
      }
    </script>

    <script type="module">
      import React, { useEffect, useMemo, useState, useCallback, useRef } from "react";
      import { createPortal } from "react-dom";
      import { createRoot } from "react-dom/client";
      import {
        ReactFlow,
        ReactFlowProvider,
        Background,
        BackgroundVariant,
        Controls,
        BaseEdge,
        EdgeLabelRenderer,
        Handle,
        Position,
        MarkerType,
        useReactFlow,
      } from "@xyflow/react";
      import ELK from "elkjs";
      import htm from "htm";

      const html = htm.bind(React.createElement);

      // ============================================================
      // DATA — same hardcoded fixture as the previous prototype, plus the
      // real `onboarding` machine extracted from a production codebase to
      // stress-test layout with many states + wildcard transitions.
      // ============================================================

      // The `*` entry inside `config` is a wildcard block — events that
      // fire from any state. Drawing it as N×M edges (one per state × event)
      // turns dense FSMs into spaghetti. We model it as a single synthetic
      // pseudo-node `__ANY__` with one outgoing edge per wildcard event,
      // matching how the source code expresses the abstraction.

      const WILDCARD_ID = "__ANY__";

      const MACHINES = {
        gameSession: {
          kind: "domain",
          initial: "IDLE",
          config: {
            IDLE: { GAME_BOOT: "RUNNING" },
            RUNNING: {
              GAME_BOOT: null,
              PAUSE_GAME: "PAUSED",
              TICK: null,
              ENEMY_SPAWN: null,
              PROJECTILE_SPAWN: null,
              DAMAGE: null,
              ENEMY_KILLED: null,
              PLAYER_HIT: null,
              PLAYER_DEAD: "GAME_OVER",
            },
            PAUSED: { GAME_BOOT: "RUNNING", RESUME_GAME: "RUNNING" },
            GAME_OVER: { GAME_BOOT: "RUNNING" },
          },
          effects: {},
        },
        bootSystem: {
          kind: "domain",
          initial: "READY",
          config: {
            READY: { GAME_BOOT: "SPAWNING" },
            SPAWNING: { BOOT_DONE: "READY" },
          },
          effects: {
            SPAWNING: [
              { event: "DESPAWN", routing: "actor[]" },
              { event: "PLAYER_SPAWN", routing: "default" },
              { event: "BOOT_DONE", routing: "default" },
            ],
          },
        },
        playerAutoFire: {
          kind: "domain",
          initial: "READY",
          config: {
            READY: { TICK: "AIMING" },
            AIMING: { PROJECTILE_SPAWN: "READY", FIRE_SKIP: "READY" },
          },
          effects: {
            AIMING: [
              { event: "PROJECTILE_SPAWN", routing: "default", when: "target found" },
              { event: "FIRE_SKIP", routing: "default", when: "no target" },
            ],
          },
        },
        trackInstance: {
          kind: "actor",
          groupTag: "track",
          initial: "__INIT",
          config: {
            __INIT: { TRACK_LOAD: "BUFFERING" },
            BUFFERING: { BUFFER_DONE: "PLAYING", BUFFER_ERROR: "__RESOLVED", DISCARD: "__RESOLVED" },
            PLAYING: { TRACK_END: "__RESOLVED", PAUSE: "PAUSED", DISCARD: "__RESOLVED" },
            PAUSED: { RESUME: "PLAYING", DISCARD: "__RESOLVED" },
          },
          effects: {
            BUFFERING: [{ event: "BUFFER_DONE", routing: "actor", when: "threshold reached" }],
            PLAYING: [{ event: "TRACK_END", routing: "actor", when: "duration reached" }],
          },
        },
        player: {
          kind: "domain",
          initial: "IDLE",
          config: {
            IDLE: { PLAY: "PLAYING" },
            PLAYING: { TRACK_END: "CHECKING_NEXT", PAUSE: "PAUSED", STOP: "STOPPED", LOGOUT: "STOPPED" },
            PAUSED: { RESUME: "PLAYING", STOP: "STOPPED", LOGOUT: "STOPPED" },
            CHECKING_NEXT: { NEXT_TRACK: "PLAYING", QUEUE_EMPTY: "STOPPED", STOP: "STOPPED" },
            STOPPED: { PLAY: "PLAYING" },
          },
          effects: {
            PLAYING: [{ event: "TRACK_LOAD", routing: "actor", when: "new track" }],
            CHECKING_NEXT: [
              { event: "NEXT_TRACK", routing: "default", when: "queue has next" },
              { event: "QUEUE_EMPTY", routing: "default", when: "queue empty" },
            ],
          },
        },
        // Real-world example: artist-recommendation onboarding flow with
        // 10 states, async fetch/save/finish branches and a "*" wildcard
        // for cross-cutting events (logout, save-on-select, finish). The
        // visualisation renders "*" as a single synthetic source node so
        // the diagram stays readable instead of exploding into ~70 edges.
        onboarding: {
          kind: "domain",
          initial: "IDLE",
          config: {
            "*": {
              ONBOARDING_SELECT_ARTIST: "SAVE_ONBOARDING_STATE",
              ONBOARDING_UNSELECT_ARTIST: "SAVE_ONBOARDING_STATE",
              ONBOARDING_SEARCH_SELECT_ARTIST: "SAVE_ONBOARDING_STATE",
              ONBOARDING_SEARCH_UNSELECT_ARTIST: "SAVE_ONBOARDING_STATE",
              FETCH_ONBOARDING_RESOLVE: null,
              FETCH_RELATED_ONBOARDING_RESOLVE: null,
              FINISH_ONBOARDING: "FINISH_ONBOARDING_PENDING",
              IAM_LOGOUT_RESOLVE: "DISABLED",
              IAM_LOGIN_RESOLVE: "CHECK_ACTIVE_ONBOARDING",
            },
            IDLE: { DO_INIT: "CHECK_ACTIVE_ONBOARDING" },
            CHECK_ACTIVE_ONBOARDING: {
              CHECK_ACTIVE_ONBOARDING_RESOLVE: "STARTUP_ONBOARDING",
              CHECK_ACTIVE_ONBOARDING_REJECT: "DISABLED",
            },
            FETCH_ONBOARDING_PENDING: {
              FETCH_ONBOARDING_RESOLVE: "READY",
              FETCH_ONBOARDING_REJECT: "READY",
            },
            SAVE_ONBOARDING_STATE: {
              SAVE_ONBOARDING_STATE_RESOLVE: "READY",
              SAVE_ONBOARDING_STATE_REJECT: "READY",
            },
            FINISH_ONBOARDING_PENDING: {
              FINISH_ONBOARDING_RESOLVE: "END",
              FINISH_ONBOARDING_REJECT: "READY",
            },
            STARTUP_ONBOARDING: { FETCH_ONBOARDING: "FETCH_ONBOARDING_PENDING" },
            READY: { FETCH_ONBOARDING: "FETCH_ONBOARDING_PENDING" },
            DISABLED: {},
            ERROR: {},
            END: {},
          },
          effects: {
            CHECK_ACTIVE_ONBOARDING: [
              { event: "CHECK_ACTIVE_ONBOARDING_RESOLVE", routing: "default", when: "preconditions ok" },
              { event: "CHECK_ACTIVE_ONBOARDING_REJECT", routing: "default", when: "auth/conditions fail" },
            ],
            SAVE_ONBOARDING_STATE: [
              { event: "SAVE_ONBOARDING_STATE_RESOLVE", routing: "default", when: "save ok" },
              { event: "SAVE_ONBOARDING_STATE_REJECT", routing: "default", when: "save fail" },
            ],
            FETCH_ONBOARDING_PENDING: [
              { event: "FETCH_ONBOARDING_RESOLVE", routing: "default", when: "fetch ok" },
              { event: "FETCH_ONBOARDING_REJECT", routing: "default", when: "fetch fail" },
            ],
            FINISH_ONBOARDING_PENDING: [
              { event: "FINISH_ONBOARDING_RESOLVE", routing: "default", when: "finish ok" },
              { event: "FINISH_ONBOARDING_REJECT", routing: "default", when: "finish fail" },
            ],
            STARTUP_ONBOARDING: [{ event: "FETCH_ONBOARDING", routing: "default" }],
          },
        },
      };

      // For an event, list every effect-emission across the system.
      const PRODUCERS = (() => {
        const out = {};
        for (const [machineId, m] of Object.entries(MACHINES)) {
          for (const [stateKey, effs] of Object.entries(m.effects)) {
            for (const eff of effs) {
              (out[eff.event] ??= []).push({ machineId, sourceState: stateKey, when: eff.when ?? null });
            }
          }
        }
        return out;
      })();

      // External / self-emit / from-other relative to the visualised machine.
      function categoryOf(eventType, currentMachineId) {
        const ps = PRODUCERS[eventType];
        if (!ps || ps.length === 0) return "external";
        if (ps.some((p) => p.machineId === currentMachineId)) return "self";
        return "other";
      }

      // ============================================================
      // BUILD react-flow nodes + edges from one machine config.
      // Edges between same (source, target) and same category are collapsed
      // into a single edge whose `data.events` lists the original event names.
      // Self-loops (`null` target) are flagged so they're rendered separately.
      // ============================================================
      function buildModel(machineId) {
        const m = MACHINES[machineId];

        // Split off wildcard transitions: rendered from a synthetic source
        // node (WILDCARD_ID) instead of being expanded into N×M edges.
        const wildcardEdges = m.config["*"] ?? null;
        const realStates = { ...m.config };
        delete realStates["*"];

        // Collect every state name referenced in the config — both keys and
        // transition targets. This catches pseudo-states like `__RESOLVED`
        // that only appear as targets (terminal sinks for actors).
        const stateSet = new Set(Object.keys(realStates));
        for (const edges of Object.values(realStates)) {
          for (const target of Object.values(edges)) {
            if (target !== null) stateSet.add(target);
          }
        }
        if (wildcardEdges) {
          for (const target of Object.values(wildcardEdges)) {
            if (target !== null) stateSet.add(target);
          }
        }
        const stateKeys = [...stateSet];

        const nodes = stateKeys.map((stateKey) => {
          let role = "normal";
          if (stateKey === m.initial) role = "initial";
          else if (stateKey.startsWith("__")) role = "terminal";
          const marker =
            stateKey === m.initial
              ? "initial"
              : stateKey === "__INIT"
                ? "spawn"
                : stateKey.startsWith("__")
                  ? "terminal"
                  : null;
          return {
            id: stateKey,
            type: "state",
            position: { x: 0, y: 0 },
            data: { label: stateKey, role, marker, width: nodeWidthFor(stateKey, marker) },
          };
        });

        if (wildcardEdges) {
          nodes.push({
            id: WILDCARD_ID,
            type: "state",
            position: { x: 0, y: 0 },
            data: {
              label: "*",
              role: "wildcard",
              marker: "any",
              width: nodeWidthFor("*", "any"),
              wildcardEventCount: Object.keys(wildcardEdges).length,
            },
          });
        }

        const buckets = new Map();
        const addToBucket = (source, eventType, edgeRaw) => {
          const target = edgeRaw === null ? source : edgeRaw;
          const category = categoryOf(eventType, machineId);
          const key = `${source}::${target}::${category}`;
          if (!buckets.has(key)) {
            buckets.set(key, { source, target, category, events: [] });
          }
          buckets.get(key).events.push({
            name: eventType,
            sources: PRODUCERS[eventType] ?? [],
          });
        };

        for (const [stateKey, edges] of Object.entries(realStates)) {
          for (const [eventType, edgeRaw] of Object.entries(edges)) {
            addToBucket(stateKey, eventType, edgeRaw);
          }
        }
        if (wildcardEdges) {
          for (const [eventType, edgeRaw] of Object.entries(wildcardEdges)) {
            addToBucket(WILDCARD_ID, eventType, edgeRaw);
          }
        }

        // Stable order across categories so self-loop stacking is deterministic.
        const sortedBuckets = [...buckets.values()].sort((a, b) => {
          if (a.source !== b.source) return a.source < b.source ? -1 : 1;
          if (a.target !== b.target) return a.target < b.target ? -1 : 1;
          return CAT_ORDER.indexOf(a.category) - CAT_ORDER.indexOf(b.category);
        });

        // Group edges by directed (source, target) pair so we can spread
        // labels along the path when multiple edges share the same endpoints
        // (e.g. several event categories collapsed to parallel routes).
        const siblingGroups = new Map();
        for (const b of sortedBuckets) {
          const key = `${b.source}::${b.target}`;
          if (!siblingGroups.has(key)) siblingGroups.set(key, []);
          siblingGroups.get(key).push(b);
        }

        const edges = sortedBuckets.map((b, i) => {
          const key = `${b.source}::${b.target}`;
          const siblings = siblingGroups.get(key);
          const siblingIndex = siblings.indexOf(b);
          const siblingTotal = siblings.length;
          // Spread labels along the path — first edge anchors near start,
          // last near end. Single edge stays centred at t=0.5.
          const labelT = siblingTotal === 1 ? 0.5 : 0.32 + (siblingIndex / (siblingTotal - 1)) * 0.36;
          return {
            id: `e${i}`,
            source: b.source,
            target: b.target,
            type: "collapsed",
            data: {
              category: b.category,
              events: b.events,
              isSelf: b.source === b.target,
              labelT,
            },
            markerEnd: {
              type: MarkerType.ArrowClosed,
              width: 14,
              height: 14,
              color: COLORS[b.category],
            },
          };
        });

        // Per-node degree counts shown inside the node card. Height grows
        // with side degree so ELK has vertical room to spread attachment
        // points along east/west sides — keeps parallel edges from sharing
        // the same y corridor when a node has 3+ in/out edges.
        const inDeg = {},
          outDeg = {},
          selfLoops = {};
        for (const e of edges) {
          if (e.source === e.target) {
            selfLoops[e.source] = (selfLoops[e.source] ?? 0) + 1;
          } else {
            outDeg[e.source] = (outDeg[e.source] ?? 0) + 1;
            inDeg[e.target] = (inDeg[e.target] ?? 0) + 1;
          }
        }
        for (const n of nodes) {
          n.data.inDeg = inDeg[n.id] ?? 0;
          n.data.outDeg = outDeg[n.id] ?? 0;
          n.data.selfLoops = selfLoops[n.id] ?? 0;
          const maxSide = Math.max(n.data.inDeg, n.data.outDeg);
          n.data.height = NODE_H_BASE + Math.max(0, maxSide - 2) * NODE_H_PER_EXTRA;
        }

        return { nodes, edges };
      }

      const COLORS = {
        external: "#e6a957",
        self: "#82c79c",
        other: "#c79de0",
      };
      const CAT_ORDER = ["external", "self", "other"];

      // ============================================================
      // ELK auto-layout — `layered` LR with orthogonal edge routing.
      // ELK returns absolute bend points for every routed edge; we use them
      // to draw clean orthogonal-style polylines instead of computing our
      // own bezier control points (which produced crossings on dense graphs).
      // Self-loops are filtered out and rendered manually on the right of
      // the node — ELK's layered algorithm doesn't route them.
      // ============================================================
      const NODE_W_MIN = 160;
      // JetBrains Mono 12px @ font-weight 600 ≈ 7.4 px / glyph (measured).
      const NODE_NAME_CHAR_W = 7.4;
      const NODE_PADDING_W = 28;       // CSS L+R padding + 1px border each side + buffer
      const NODE_MARKER_GAP = 6;
      const NODE_MARKER_W = 56;        // approx width of "INITIAL" / "TERMINAL" / "any state" badges
      const NODE_H_BASE = 70;
      const NODE_H_PER_EXTRA = 18;

      function nodeWidthFor(label, marker) {
        const w = label.length * NODE_NAME_CHAR_W
          + NODE_PADDING_W
          + (marker ? NODE_MARKER_GAP + NODE_MARKER_W : 0);
        return Math.max(NODE_W_MIN, Math.ceil(w));
      }
      const elk = new ELK();

      async function layoutWithElk(nodes, edges) {
        const routedEdges = edges.filter((e) => !e.data.isSelf);

        const elkGraph = {
          id: "root",
          layoutOptions: {
            "elk.algorithm": "layered",
            "elk.direction": "RIGHT",
            "elk.edgeRouting": "ORTHOGONAL",
            "elk.spacing.nodeNode": "80",
            "elk.spacing.edgeEdge": "28",
            "elk.spacing.edgeNode": "40",
            "elk.layered.spacing.nodeNodeBetweenLayers": "200",
            "elk.layered.spacing.edgeNodeBetweenLayers": "50",
            "elk.layered.spacing.edgeEdgeBetweenLayers": "28",
            "elk.layered.nodePlacement.strategy": "NETWORK_SIMPLEX",
            "elk.layered.crossingMinimization.strategy": "LAYER_SWEEP",
            "elk.layered.thoroughness": "10",
          },
          children: nodes.map((n) => ({
            id: n.id,
            width: n.data.width ?? NODE_W_MIN,
            height: n.data.height ?? NODE_H_BASE,
          })),
          edges: routedEdges.map((e) => ({
            id: e.id,
            sources: [e.source],
            targets: [e.target],
          })),
        };

        const out = await elk.layout(elkGraph);
        const positions = new Map(out.children.map((c) => [c.id, { x: c.x, y: c.y }]));
        const routes = new Map();
        for (const ee of out.edges ?? []) {
          const sec = ee.sections?.[0];
          if (!sec) continue;
          routes.set(ee.id, {
            start: sec.startPoint,
            end: sec.endPoint,
            bends: sec.bendPoints ?? [],
          });
        }

        const positionedNodes = nodes.map((n) => ({
          ...n,
          position: positions.get(n.id) ?? n.position,
        }));

        // Self-loops: pre-compute geometry per node so multiple loops on the
        // same state stack predictably without overlap.
        const loopsByNode = {};
        for (const e of edges) {
          if (e.data.isSelf) (loopsByNode[e.source] ??= []).push(e);
        }
        for (const list of Object.values(loopsByNode)) {
          list.sort((a, b) => CAT_ORDER.indexOf(a.data.category) - CAT_ORDER.indexOf(b.data.category));
        }

        const heightById = new Map(nodes.map((n) => [n.id, n.data.height ?? NODE_H_BASE]));
        const widthById = new Map(nodes.map((n) => [n.id, n.data.width ?? NODE_W_MIN]));

        const positionedEdges = edges.map((e) => {
          if (e.data.isSelf) {
            const list = loopsByNode[e.source];
            const idx = list.indexOf(e);
            return {
              ...e,
              data: {
                ...e.data,
                selfIndex: idx,
                selfTotal: list.length,
                nodeHeight: heightById.get(e.source),
                nodeWidth: widthById.get(e.source),
              },
            };
          }
          return { ...e, data: { ...e.data, route: routes.get(e.id) ?? null } };
        });

        // Post-layout collision pass: edges with different (source, target)
        // can route through the same area and have their midpoint labels
        // overlap. Slide each colliding label along its own path until
        // no rect-overlap remains, capped by a few iterations.
        resolveLabelCollisions(positionedEdges);

        return { nodes: positionedNodes, edges: positionedEdges };
      }

      // Estimate label bbox in ELK coordinate space. Font is 10px monospace,
      // ~6.4px per glyph + 14px padding/border; capped to match the visual
      // `.edge-label { max-width }` so collision math matches what's drawn.
      const LABEL_MAX_W = 170;
      function estimateLabelBox(edge) {
        const events = edge.data.events;
        const text = events.length > 1 ? `${events[0].name}+${events.length - 1}` : events[0].name;
        const w = Math.min(text.length * 6.4 + 14, LABEL_MAX_W);
        const h = 18;
        return { w, h };
      }

      // Iteratively shift label t to remove rect-overlap with other labels.
      // Walks both directions from the initial t until a clear slot is found
      // or the search range is exhausted.
      function resolveLabelCollisions(edges) {
        const slots = [];
        for (const e of edges) {
          if (e.data.isSelf || !e.data.route) continue;
          const pts = [e.data.route.start, ...e.data.route.bends, e.data.route.end];
          const t = e.data.labelT ?? 0.5;
          const at = polylinePointAt(pts, t);
          const { w, h } = estimateLabelBox(e);
          slots.push({ edge: e, pts, t, x: at.x, y: at.y, w, h });
        }

        const overlaps = (a, b) => {
          const dx = Math.abs(a.x - b.x);
          const dy = Math.abs(a.y - b.y);
          // Add 8px breathing margin so labels don't touch even if rects don't intersect.
          return dx < (a.w + b.w) / 2 + 8 && dy < (a.h + b.h) / 2 + 6;
        };

        const tryT = (slot, t) => {
          const at = polylinePointAt(slot.pts, t);
          return { ...slot, t, x: at.x, y: at.y };
        };

        for (let pass = 0; pass < 4; pass++) {
          let moved = false;
          for (let i = 0; i < slots.length; i++) {
            for (let j = i + 1; j < slots.length; j++) {
              if (!overlaps(slots[i], slots[j])) continue;
              // Try shifting slot j away from its current t in both directions.
              const candidates = [];
              for (const dt of [0.12, -0.12, 0.22, -0.22, 0.32, -0.32]) {
                const t = slots[j].t + dt;
                if (t < 0.1 || t > 0.9) continue;
                candidates.push(tryT(slots[j], t));
              }
              const best = candidates.find((c) => slots.every((s, k) => k === j || !overlaps(c, s)));
              if (best) {
                slots[j] = best;
                moved = true;
              }
            }
          }
          if (!moved) break;
        }

        for (const s of slots) {
          s.edge.data.labelT = s.t;
        }
      }

      // Build a rounded-corner polyline path from a list of bend points.
      // ELK orthogonal routing always produces axis-aligned segments, so we
      // can safely assume the corner radius doesn't break the geometry.
      function polylinePath(pts, radius = 10) {
        if (pts.length < 2) return "";
        let d = `M ${pts[0].x} ${pts[0].y}`;
        for (let i = 1; i < pts.length - 1; i++) {
          const prev = pts[i - 1],
            cur = pts[i],
            next = pts[i + 1];
          const inLen = Math.hypot(cur.x - prev.x, cur.y - prev.y) || 1;
          const outLen = Math.hypot(next.x - cur.x, next.y - cur.y) || 1;
          const r = Math.min(radius, inLen / 2, outLen / 2);
          const ax = cur.x - ((cur.x - prev.x) / inLen) * r;
          const ay = cur.y - ((cur.y - prev.y) / inLen) * r;
          const bx = cur.x + ((next.x - cur.x) / outLen) * r;
          const by = cur.y + ((next.y - cur.y) / outLen) * r;
          d += ` L ${ax} ${ay} Q ${cur.x} ${cur.y}, ${bx} ${by}`;
        }
        const last = pts[pts.length - 1];
        d += ` L ${last.x} ${last.y}`;
        return d;
      }

      // Point on polyline at fractional arc length t (0..1). Used to spread
      // labels of parallel edges along the route so they don't pile up.
      function polylinePointAt(pts, t) {
        let total = 0;
        const segs = [];
        for (let i = 0; i < pts.length - 1; i++) {
          const len = Math.hypot(pts[i + 1].x - pts[i].x, pts[i + 1].y - pts[i].y);
          segs.push({ a: pts[i], b: pts[i + 1], len });
          total += len;
        }
        let target = total * Math.max(0, Math.min(1, t));
        for (const s of segs) {
          if (s.len >= target) {
            const u = s.len === 0 ? 0 : target / s.len;
            return { x: s.a.x + (s.b.x - s.a.x) * u, y: s.a.y + (s.b.y - s.a.y) * u };
          }
          target -= s.len;
        }
        return pts[pts.length - 1];
      }

      // ============================================================
      // CUSTOM NODE — state card (HTML inside a react-flow node)
      // ============================================================
      function StateNode({ data }) {
        const isWildcard = data.role === "wildcard";
        const cls =
          "state-node" +
          (data.role === "initial" ? " is-initial" : "") +
          (data.role === "terminal" ? " is-terminal" : "") +
          (isWildcard ? " is-wildcard" : "");

        const dims = { width: `${data.width}px`, height: `${data.height}px` };

        if (isWildcard) {
          const events = data.wildcardEventCount ?? data.outDeg;
          return html`
            <div className=${cls} style=${dims}>
              <div className="row1">
                <span className="name">${data.label}</span>
                <span className="marker any">any state</span>
              </div>
              <div className="stats">
                <span>${events} event${events === 1 ? "" : "s"}</span>
                ${data.selfLoops ? html`<span style=${{ marginLeft: "6px" }} title="stay-in-state events">↻ ${data.selfLoops}</span>` : null}
              </div>
              <${Handle} type="source" position=${Position.Right} />
            </div>
          `;
        }

        return html`
          <div className=${cls} style=${dims}>
            <${Handle} type="target" position=${Position.Left} />
            <div className="row1">
              <span className="name">${data.label}</span>
              ${data.marker ? html`<span className=${`marker ${data.marker}`}>${data.marker}</span>` : null}
            </div>
            <div className="stats">
              <span className="stat in">${data.inDeg}</span>
              <span className="stat out">${data.outDeg}</span>
              ${data.selfLoops ? html`<span className="stat" title="self-loops">↻ ${data.selfLoops}</span>` : null}
            </div>
            <${Handle} type="source" position=${Position.Right} />
          </div>
        `;
      }

      // ============================================================
      // CUSTOM EDGE — uses ELK-precomputed bend points for orthogonal
      // routing, falls back to a direct line if ELK didn't route the edge
      // (only happens for self-loops, handled separately).
      //   Style by category: solid amber / dashed green / dotted purple.
      //   Self-loops: compact arc above the node, fanned horizontally when
      //   multiple loops share a node. Top placement keeps east side free
      //   for the layered LTR flow's outgoing edges.
      // ============================================================
      // Concentric self-loops above node: each successive loop has a wider
      // opening and reaches higher, so multiple categories on the same node
      // form a stack of nested arches with labels neatly aligned to each peak.
      const SELF_LOOP_BASE_OPENING = 16;
      const SELF_LOOP_BASE_REACH = 28;
      const SELF_LOOP_STEP_OPENING = 14;
      const SELF_LOOP_STEP_REACH = 22;

      function CollapsedEdge(props) {
        const { id, sourceX, sourceY, data, markerEnd } = props;
        const cat = data.category;
        const events = data.events;
        const isSelf = data.isSelf;
        const [popover, setPopover] = useState(null);
        const labelRef = useRef(null);

        let edgePath, labelX, labelY;
        if (isSelf) {
          // sourceX,sourceY = right handle (east center). Derive top center
          // from the actual node bbox (width grows with label, height with
          // side degree).
          const idx = data.selfIndex ?? 0;
          const h = data.nodeHeight ?? NODE_H_BASE;
          const w = data.nodeWidth ?? NODE_W_MIN;
          const cx = sourceX - w / 2;
          const nodeTopY = sourceY - h / 2;
          const opening = SELF_LOOP_BASE_OPENING + idx * SELF_LOOP_STEP_OPENING;
          const reach = SELF_LOOP_BASE_REACH + idx * SELF_LOOP_STEP_REACH;
          const xLeft = cx - opening / 2;
          const xRight = cx + opening / 2;
          const peakY = nodeTopY - reach;
          edgePath = `M ${xLeft} ${nodeTopY} ` + `C ${xLeft} ${peakY}, ${xRight} ${peakY}, ${xRight} ${nodeTopY}`;
          labelX = cx;
          labelY = peakY - 10;
        } else if (data.route) {
          const pts = [data.route.start, ...data.route.bends, data.route.end];
          edgePath = polylinePath(pts, 10);
          const at = polylinePointAt(pts, data.labelT ?? 0.5);
          labelX = at.x;
          labelY = at.y;
        } else {
          // Defensive fallback — straight line between RF handle positions.
          edgePath = `M ${sourceX} ${sourceY} L ${props.targetX} ${props.targetY}`;
          labelX = (sourceX + props.targetX) / 2;
          labelY = (sourceY + props.targetY) / 2;
        }

        const styleByCat = {
          external: { stroke: COLORS.external, strokeDasharray: undefined },
          self: { stroke: COLORS.self, strokeDasharray: "6 4" },
          other: { stroke: COLORS.other, strokeDasharray: "1 3.5", strokeLinecap: "round" },
        }[cat];

        const countSuffix = events.length > 1 ? html`<span className="count">+${events.length - 1}</span>` : null;

        const onEnter = (ev) => {
          const r = ev.currentTarget.getBoundingClientRect();
          setPopover({ x: r.left + r.width / 2, y: r.top });
        };
        const onLeave = () => setPopover(null);

        return html`
          <${BaseEdge}
            id=${id}
            path=${edgePath}
            markerEnd=${markerEnd}
            style=${{ ...styleByCat, strokeWidth: 1.7, fill: "none" }}
          />
          <${EdgeLabelRenderer}>
            <div
              ref=${labelRef}
              className=${`edge-label cat-${cat}`}
              onMouseEnter=${onEnter}
              onMouseLeave=${onLeave}
              style=${{
                position: "absolute",
                transform: `translate(-50%, -50%) translate(${labelX}px, ${labelY}px)`,
                pointerEvents: "all",
              }}
            >
              <span className="name">${events[0].name}</span>${countSuffix}
            </div>
          <//>
          ${popover &&
          html`
            <${ScreenPopover}
              x=${popover.x}
              y=${popover.y}
              category=${cat}
              source=${props.source}
              target=${props.target}
              isSelf=${isSelf}
              events=${events}
            />
          `}
        `;
      }

      // Tooltip rendered as a portal-ish absolutely-positioned div in screen
      // coordinates so it never gets clipped by react-flow's pan/zoom transforms.
      function ScreenPopover({ x, y, category, source, target, isSelf, events }) {
        const popRef = useRef(null);
        const [pos, setPos] = useState({ left: x, top: y, ready: false });
        useEffect(() => {
          if (!popRef.current) return;
          const r = popRef.current.getBoundingClientRect();
          const margin = 12;
          let top = y - r.height - 12; // prefer above
          if (top < margin) top = y + 22; // flip below if not enough room
          let left = x - r.width / 2;
          if (left < margin) left = margin;
          if (left + r.width > window.innerWidth - margin) left = window.innerWidth - r.width - margin;
          setPos({ left, top, ready: true });
        }, [x, y]);

        const node = html`
          <div
            ref=${popRef}
            className="events-popover"
            style=${{
              left: `${pos.left}px`,
              top: `${pos.top}px`,
              opacity: pos.ready ? 1 : 0,
            }}
          >
            <div className="head">
              <span className=${`cat cat-${category}`}>${category}</span>
              <span className="arrow">·</span>
              <b>${source}</b>
              <span className="arrow">${isSelf ? "↻" : "→"}</span>
              ${isSelf ? html`<span>self</span>` : html`<span className="target">${target}</span>`}
            </div>
            ${events.map((ev) => {
              const from = ev.sources.length
                ? ev.sources.map((s) => `${s.machineId}.${s.sourceState}`).join(", ")
                : "external";
              return html`
                <div key=${ev.name} className=${`ev cat-${category}`}>
                  <span className="ev-name">${ev.name}</span>
                  <span className="from">${from}</span>
                </div>
              `;
            })}
          </div>
        `;
        // Portal-out so popover lives in <body> instead of inside the SVG —
        // otherwise position:fixed gets confused by the SVG namespace.
        return createPortal(node, document.body);
      }

      const nodeTypes = { state: StateNode };
      const edgeTypes = { collapsed: CollapsedEdge };

      // ============================================================
      // ROOT — load one machine, run ELK, hand off to <ReactFlow />.
      // ============================================================
      function GraphView({ machineId }) {
        const [layout, setLayout] = useState({ nodes: [], edges: [], ready: false });
        const { fitView } = useReactFlow();

        useEffect(() => {
          let cancelled = false;
          const model = buildModel(machineId);
          layoutWithElk(model.nodes, model.edges).then(({ nodes, edges }) => {
            if (cancelled) return;
            setLayout({ nodes, edges, ready: true });
          });
          return () => {
            cancelled = true;
          };
        }, [machineId]);

        // Re-fit after each render where nodes were just laid out — react-flow
        // can only measure nodes once they're in the DOM, and node heights
        // here are dynamic (grow with side degree), so the bbox isn't stable
        // until layout + a couple of paint frames later. We fit twice: an
        // early call for the small/common case, then a second one with the
        // measured tall nodes for dense machines like `onboarding`.
        useEffect(() => {
          if (!layout.ready) return;
          const t1 = setTimeout(() => fitView({ padding: 0.2, duration: 0 }), 50);
          const t2 = setTimeout(() => fitView({ padding: 0.2, duration: 200 }), 280);
          return () => {
            clearTimeout(t1);
            clearTimeout(t2);
          };
        }, [layout.ready, machineId, fitView]);

        return html`
          <${ReactFlow}
            nodes=${layout.nodes}
            edges=${layout.edges}
            nodeTypes=${nodeTypes}
            edgeTypes=${edgeTypes}
            fitView=${true}
            fitViewOptions=${{ padding: 0.2 }}
            nodesDraggable=${false}
            nodesConnectable=${false}
            elementsSelectable=${true}
            proOptions=${{ hideAttribution: true }}
            defaultEdgeOptions=${{ type: "collapsed" }}
            minZoom=${0.3}
            maxZoom=${1.6}
          >
            <${Background} variant=${BackgroundVariant.Dots} gap=${20} size=${1} color="rgba(255,255,255,0.045)" />
            <${Controls} showInteractive=${false} />
          <//>
        `;
      }

      function App() {
        const [machineId, setMachineId] = useState("gameSession");
        const m = MACHINES[machineId];
        // Wildcard "*" is a config-level abstraction, not a real state — exclude
        // it from the state count and treat its entries as wildcard events.
        const stateCount = Object.keys(m.config).filter((k) => k !== "*").length;
        const wildcardCount = m.config["*"] ? Object.keys(m.config["*"]).length : 0;
        let evCount = 0,
          effCount = 0;
        for (const [key, e] of Object.entries(m.config)) {
          if (key === "*") continue;
          evCount += Object.keys(e).length;
        }
        for (const e of Object.values(m.effects)) for (const _ of e) effCount += 1;

        return html`
          <div className="app">
            <header className="topbar">
              <div className="mark">lf</div>
              <div>machine view · <b>graph (react-flow + elk)</b></div>
              <select
                value=${machineId}
                onChange=${(e) => setMachineId(e.target.value)}
                style=${{
                  background: "var(--panel-soft)",
                  color: "var(--ink)",
                  border: "1px solid var(--line)",
                  padding: "4px 8px",
                  borderRadius: "5px",
                  fontFamily: "var(--mono)",
                  fontSize: "12px",
                }}
              >
                ${Object.keys(MACHINES).map((id) => html`<option key=${id} value=${id}>${id}</option>`)}
              </select>
              <div className="stack">
                <b>${stateCount}</b> states · <b>${evCount}</b> consumed${wildcardCount ? html` · <b>${wildcardCount}</b> wildcards` : null} · <b>${effCount}</b> emitted · stack:
                <b>react-flow 12</b> + <b>elkjs 0.9</b>
              </div>
            </header>
            <${ReactFlowProvider}>
              <${GraphView} machineId=${machineId} />
            <//>
          </div>
        `;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
