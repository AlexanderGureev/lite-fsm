<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="l-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="spark-glow-dark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <path id="l-path-dark" d="M 50 40 L 50 144 Q 50 184 90 184 L 174 184" stroke="url(#l-grad-dark)" stroke-width="28" stroke-linecap="round" fill="none" />

  <circle cx="50" cy="40" r="7" fill="#0f172a" />
  <circle cx="174" cy="184" r="7" fill="#0f172a" />

  <g>
    <circle r="11" fill="#ffffff" filter="url(#spark-glow-dark)" opacity="0">
      <animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#l-path-dark" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.12;0.88;1" dur="2.6s" repeatCount="indefinite" />
    </circle>
    <circle r="4.5" fill="#ffffff" opacity="0">
      <animateMotion dur="2.6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#l-path-dark" />
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.88;1" dur="2.6s" repeatCount="indefinite" />
    </circle>
  </g>

  <text x="82" y="138" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="84" font-weight="900" letter-spacing="-4" fill="#f8fafc">fsm</text>
</svg>
